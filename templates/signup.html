<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Medhix AI | Create Account</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:Arial,Helvetica,sans-serif;

}

body{

background:#050B16;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

color:white;

}

.signup-container{

width:1000px;

max-width:95%;

background:#111B30;

border:1px solid rgba(0,229,255,.5);

border-radius:25px;

display:grid;

grid-template-columns:1fr 1fr;

overflow:hidden;

box-shadow:0 0 25px rgba(0,229,255,.15);

}

.left{

padding:60px;

display:flex;

flex-direction:column;

justify-content:center;

background:linear-gradient(135deg,#111B30,#0C1528);

}

.left h1{

font-size:42px;

color:cyan;

margin-bottom:15px;

}

.left p{

font-size:18px;

line-height:1.8;

color:#d5e8ff;

}

.right{

padding:60px;

display:flex;

flex-direction:column;

justify-content:center;

}

.right h2{

font-size:34px;

margin-bottom:30px;

}

.input-group{

margin-bottom:22px;

}

.input-group label{

display:block;

margin-bottom:8px;

font-size:15px;

color:#d5e8ff;

}

.input-group input{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:#1A2946;

color:white;

font-size:16px;

outline:none;

transition:.3s;

}

.input-group input:focus{

box-shadow:0 0 10px rgba(0,255,255,.35);

}

input:-webkit-autofill{

-webkit-box-shadow:0 0 0 1000px #1A2946 inset !important;

-webkit-text-fill-color:white !important;

}

.signup-btn{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:cyan;

color:black;

font-size:17px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

.signup-btn:hover{

transform:translateY(-2px);

box-shadow:0 0 15px cyan;

}

.login-text{

margin-top:20px;

text-align:center;

color:#d5e8ff;

}

.login-text a{

color:cyan;

text-decoration:none;

font-weight:bold;

}

.login-text a:hover{

text-decoration:underline;

}

.error{

background:rgba(255,0,0,.12);

border:1px solid rgba(255,0,0,.4);

padding:12px;

border-radius:10px;

margin-bottom:20px;

color:#ff8a8a;

}

@media(max-width:850px){

.signup-container{

grid-template-columns:1fr;

}

.left{

padding:40px;

text-align:center;

}

.right{

padding:40px;

}

.left h1{

font-size:38px;

}

}

</style>

</head>

<body>

<div class="signup-container">

<div class="left">

<h1>🤖 Student AI</h1>

<p>

Learn • Ask • Explore • Grow

<br><br>

Create your free Student AI account and start learning smarter every day.

</p>

</div>

<div class="right">

<h2>Create Account</h2>

{% if error %}

<div class="error">

{{ error }}

</div>

{% endif %}

<form method="POST">
<div class="input-group">

<label>Username</label>

<input
type="text"
name="username"
placeholder="Create a username"
required>

</div>

<div class="input-group">

<label>Password</label>

<input
type="password"
name="password"
placeholder="Create a password"
required>

</div>

<button
type="submit"
class="signup-btn">

Create Account

</button>

</form>

<p class="login-text">

Already have an account?

<a href="/">

Sign In

</a>

</p>

</div>

</div>

</body>

</html>
