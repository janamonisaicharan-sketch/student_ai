<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Medhix AI | login </title>
<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#050B16;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

color:white;

}

.login-container{

width:1000px;

max-width:95%;

background:#111B30;

border:1px solid rgba(0,229,255,.5);

border-radius:25px;

display:grid;

grid-template-columns:1fr 1fr;

overflow:hidden;

box-shadow:0 0 30px rgba(0,255,255,.15);

}

.left{

padding:60px;

display:flex;

flex-direction:column;

justify-content:center;

background:linear-gradient(135deg,#111B30,#0C1528);

}

.left h1{

font-size:42px;

font-weight:700;

color:cyan;

margin-bottom:15px;

}

.left p{

font-size:18px;

color:#d5e8ff;

line-height:1.8;

}

.right{

padding:60px;

display:flex;

flex-direction:column;

justify-content:center;

}

.right h2{

font-size:34px;

margin-bottom:30px;

color:white;

}
.input-group{

margin-bottom:22px;

}

.input-group label{

display:block;

margin-bottom:8px;

font-size:15px;

color:#d5e8ff;

}

.input-group input{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:#1a2744;

color:white;

font-size:16px;

outline:none;

transition:.3s;

}

.input-group input:focus{

box-shadow:0 0 10px rgba(0,255,255,.4);

}

.login-btn{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:cyan;

color:black;

font-size:17px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

.login-btn:hover{

transform:translateY(-2px);

box-shadow:0 0 15px cyan;

}

.signup-text{

margin-top:20px;

text-align:center;

color:#d5e8ff;

}

.signup-text a{

color:cyan;

text-decoration:none;

font-weight:bold;

}

.signup-text a:hover{

text-decoration:underline;

}

@media(max-width:850px){

.login-container{

grid-template-columns:1fr;

}

.left{

padding:40px;

text-align:center;

}

.right{

padding:40px;

}

.left h1{

font-size:38px;

}

}

</style>

</head>

<body>

<div class="login-container">

<div class="left">

<h1>🧠 Medhix AI</h1>

<p>

Learn • Ask • Explore • Grow

<br><br>

Welcome back! Continue your learning journey with Student AI.

</p>

</div>

<div class="right">

<h2>Login</h2>

<form method="POST">

<div class="input-group">

<label>Username</label>

<input
type="text"
name="username"
placeholder="Enter your username"
required>

</div>

<div class="input-group">

<label>Password</label>

<input
type="password"
name="password"
placeholder="Enter your password"
required>

</div>

<button
type="submit"
class="login-btn">

Login

</button>

</form>

<p class="signup-text">

Don't have an account?

<a href="/signup">

Create Account

</a>

</p>

</div>

</div>

</body>

</html>
